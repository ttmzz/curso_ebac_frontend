<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #e7eef3 url('noise.png');
            padding-left: 80px;
            padding-top: 40px;
        }

        .espac {
            padding-bottom: 8px;
        }

        .btn {
           margin-top: 20px;
        }
    </style>
</head>

<body>
    <main>
        <p class="h1"><i>Formulário</i></p>
        <form>
            <div class="espac col-md-4">
               <label class="form-label h5 text-info">Nome</label>
               <input class="form-control form-control-sm" type="text" name="nome"> 
            </div>

            <div class="espac col-md-4">
              <label class="form-label h5 text-info">E-mail</label>
              <input class="form-control form-control-sm" type="email" name="email">  
            </div>
            
            <div class="espac col-md-4">
               <label class="form-label h5 text-info">Telefone</label>
               <input class="form-control form-control-sm" type="tel" name="telefone">
            </div>
            
            <button class="btn btn-outline-success">Enviar</button>
        </form>
    </main>
</body>
</html>
